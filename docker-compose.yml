services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - REDIS_URL=${REDIS_URL:?set REDIS_URL}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://seaweedfs:8333}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?set S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-dc-go}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_USE_SSL=${S3_USE_SSL:-false}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dc_go
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?set REDIS_PASSWORD}

  redisinsight:
    profiles: ["devtools"]
    image: redis/redisinsight:3.6.0
    ports:
      - "127.0.0.1:5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=DC-GO Redis
      - RI_REDIS_USERNAME=default
      - RI_REDIS_PASSWORD=${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - RI_REDIS_DB=0
      - RI_REDIS_TLS=false
      - RI_ENCRYPTION_KEY=${REDISINSIGHT_ENCRYPTION_KEY:-change-me-for-local-dev-encryption}
    volumes:
      - redisinsightdata:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5540/api/health/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seaweedfs:
    image: chrislusf/seaweedfs:4.29
    command: ["mini", "-dir=/data"]
    ports:
      - "127.0.0.1:8333:8333"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9333:9333"
      - "127.0.0.1:23646:23646"
    environment:
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY:?set S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-dc-go}
    volumes:
      - seaweeddata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  seaweeddata:
  redisinsightdata:
